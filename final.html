<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Our Date ❤️</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="music/love.mp3" type="audio/mpeg">
</audio>

<div id="mainPage">
  <div class="card">
    <div style="font-size:60px;">🌹</div>
    <h1>It's A Date ❤️</h1>
    <div id="result"></div>
    <p class="location-line">📍 Location: <b>CUET Campus</b></p>
    <h2 style="color:#ff4f87;font-family:'Dancing Script',cursive;font-size:clamp(28px,6vw,42px);margin-top:20px;">
      I Can't Wait To See You ❤️
    </h2>
    <p>See you soon... ✨</p>

    <button class="yes" onclick="saySomething()" style="margin-top:25px; width:85%; max-width:320px;">💬 Say Something</button>

    <div class="signature">With all my love, MORSALIN</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
